<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OtoWoKoto / EchoLess</title>
  <script>
    // ブラウザの言語設定を見て /ja/ か /en/ にリダイレクト
    (function() {
      const lang = (navigator.language || navigator.userLanguage || 'ja').toLowerCase();
      const isJa = lang.startsWith('ja');
      window.location.replace(isJa ? '/ja/' : '/en/');
    })();
  </script>
  <!-- JSが無効な場合のフォールバック -->
  <meta http-equiv="refresh" content="0;url=/ja/">
  <style>
    body {
      margin: 0;
      background: #f6f3ee;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #1c1814;
    }
  </style>
</head>
<body>
  <p>リダイレクト中...</p>
</body>
</html>
